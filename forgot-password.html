<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>找回密码</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e8e8;color:#1a1a1a;font-family:"ZCOOL KuaiLe","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:rgba(255,255,255,.95);max-width:380px;width:100%;border-radius:16px;padding:24px;box-shadow:3px 3px 0 rgba(0,0,0,.2);border:2px solid #333}
h1{font-size:17px;font-weight:bold;color:#2a2a2a;margin-bottom:16px;text-align:center}
.f{margin-bottom:14px}.f label{display:block;font-size:12px;font-weight:bold;margin-bottom:5px}
.f input{width:100%;padding:10px 12px;border:1.5px solid #333;border-radius:10px;font-size:14px;outline:0;background:transparent;box-sizing:border-box}
.cf-turnstile{margin:10px 0;display:flex;justify-content:center}
.btn{width:100%;padding:12px;background:#2a2a2a;color:#fff;border:0;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px}
.row{display:flex;gap:6px}.row input{flex:1}.row button{padding:8px 14px;background:#2a2a2a;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap}
.t{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#e0e0e0}.card{background:rgba(30,30,30,.95);border-color:rgba(170,170,170,.25)}h1,.f label{color:#888}.f input{border-color:rgba(170,170,170,.3);color:#e0e0e0}.btn,.row button{background:#888}}
</style></head><body>
<div class="card"><h1>找回密码</h1>
<div class="f"><label>注册邮箱</label><input type="email" id="em" placeholder="请输入注册邮箱" autocomplete="off"></div>
<div class="cf-turnstile" data-sitekey="0x4AAAAAACxkhwPrw1gO9XFQ" data-callback="tsOk" data-theme="auto"></div>
<div class="f"><label>验证码</label><div class="row"><input type="text" id="cd" placeholder="6位验证码" maxlength="6"><button id="sb" onclick="send()">发送</button></div></div>
<div class="f"><label>新密码</label><input type="password" id="pw" placeholder="8位以上含字母" autocomplete="off"></div>
<button class="btn" onclick="reset()">重置密码</button></div>
<div class="t" id="toast"></div>
<script>
var A='https://api.tian-xiao.com',_ts='';
window.tsOk=function(t){_ts=t;}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.style.opacity='1';clearTimeout(e._t);e._t=setTimeout(function(){e.style.opacity='0';},2000);}
function send(){var e=document.getElementById('em').value.trim();if(!e||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){toast('请输入有效邮箱');return;}if(!_ts){toast('请完成人机验证');return;}var b=document.getElementById('sb');b.disabled=true;fetch(A+'/api/user/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,turnstileToken:_ts})}).then(r=>r.json()).then(d=>{if(d.success){toast('验证码已发送');var s=60;b.textContent=s+'s';var t=setInterval(function(){s--;if(s<=0){clearInterval(t);b.disabled=false;b.textContent='重新发送';}else{b.textContent=s+'s';}},1000);}else{toast(d.error||'发送失败');b.disabled=false;}}).catch(function(){toast('网络错误');b.disabled=false;});}
async function reset(){var e=document.getElementById('em').value.trim();var c=document.getElementById('cd').value.trim();var p=document.getElementById('pw').value.trim();if(!e||!c||!p){toast('请填写完整');return;}if(p.length<8||!/[a-zA-Z]/.test(p)){toast('密码须8位以上且包含字母');return;}try{var r=await fetch(A+'/api/user/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,code:c,newPassword:p})});var d=await r.json();if(d.success){toast('密码已重置！');}else{toast(d.error||'重置失败');}}catch(ex){toast('网络错误');}}
</script></body></html>
