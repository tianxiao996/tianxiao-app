<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>找回密码 - 天笑の窝</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e8e8;color:#1a1a1a;font-family:"ZCOOL KuaiLe","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:rgba(255,255,255,0.95);width:100%;max-width:380px;border-radius:16px;padding:24px;box-shadow:3px 3px 0 rgba(0,0,0,0.2);border:2px solid #333}
h1{font-size:17px;font-weight:bold;color:#2a2a2a;margin-bottom:16px;text-align:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#2a2a2a;margin-bottom:5px;font-weight:bold}
.field input{width:100%;padding:10px 12px;border:1.5px solid #333;border-radius:10px;font-size:14px;outline:0;background:transparent;color:#1a1a1a;box-sizing:border-box}
.field input:focus{border-color:#2a2a2a}
.btn{width:100%;padding:12px;background:#2a2a2a;color:#fff;border:0;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.5}
.code-row{display:flex;gap:6px}
.code-row input{flex:1}
.code-row button{padding:8px 14px;background:#2a2a2a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;white-space:nowrap}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s}
@media(prefers-color-scheme:dark){
body{background:#1a1a1a;color:#e0e0e0}
.card{background:rgba(30,30,30,0.95);border-color:rgba(170,170,170,0.25)}
h1{color:#888}.field label{color:#888}.field input{border-color:rgba(170,170,170,0.3);color:#e0e0e0}
.btn,.code-row button{background:#888}
}
</style></head><body>
<div class="card">
<h1>找回密码</h1>
<div class="field"><label>注册邮箱</label><input type="email" id="email" placeholder="请输入注册时使用的邮箱" autocomplete="off"></div>
<div id="tsBox" style="display:flex;justify-content:center;margin-bottom:12px;"></div>
<div class="field"><label>验证码</label><div class="code-row"><input type="text" id="code" placeholder="6位验证码" maxlength="6"><button id="sendBtn" onclick="sendCode()">发送</button></div></div>
<div class="field"><label>新密码（8位以上含字母）</label><input type="password" id="newPwd" placeholder="请输入新密码" autocomplete="off"></div>
<button class="btn" onclick="doReset()">重置密码</button>
</div>
<script>
var API='https://api.tian-xiao.com',TK='0x4AAAAAACxkhwPrw1gO9XFQ',_tsReady=false,_tsToken='';
(function(){var s=document.createElement('script');s.src='https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=_onTs';s.async=true;s.onerror=function(){setTimeout(function(){var s2=document.createElement('script');s2.src='https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=_onTs';s2.async=true;document.head.appendChild(s2);},3000);};document.head.appendChild(s);})();
window._onTs=function(){_tsReady=true;var b=document.getElementById('tsBox');if(b&&window.turnstile){b.innerHTML='';var d=document.createElement('div');b.appendChild(d);turnstile.render(d,{sitekey:TK,theme:'auto',callback:function(t){_tsToken=t;}});}};
function toast(m){var t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.className='toast';document.body.appendChild(t);}t.textContent=m;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(function(){t.style.opacity='0';},2000);}
function sendCode(){var e=document.getElementById('email').value.trim();if(!e||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){toast('请输入有效邮箱');return;}var b=document.getElementById('sendBtn');b.disabled=true;fetch(API+'/api/user/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,turnstileToken:_tsToken})}).then(function(r){return r.json()}).then(function(d){if(d.success){toast('验证码已发送');var s=60;b.textContent=s+'s';var t=setInterval(function(){s--;if(s<=0){clearInterval(t);b.disabled=false;b.textContent='重新发送';}else{b.textContent=s+'s';}},1000);}else{toast(d.error||'发送失败');b.disabled=false;}}).catch(function(){toast('网络错误');b.disabled=false;});}
async function doReset(){var e=document.getElementById('email').value.trim();var c=document.getElementById('code').value.trim();var p=document.getElementById('newPwd').value.trim();if(!e||!c||!p){toast('请填写完整');return;}if(p.length<8||!/[a-zA-Z]/.test(p)){toast('密码须8位以上且包含字母');return;}try{var r=await fetch(API+'/api/user/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,code:c,newPassword:p})});var d=await r.json();if(d.success){toast('密码已重置！返回登录吧');}else{toast(d.error||'重置失败');}}catch(ex){toast('网络错误');}}
</script>
</body></html>
