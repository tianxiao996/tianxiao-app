<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>注册 - 天笑の窝</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ddd;font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{background:#1a1a1a;border-radius:16px;padding:32px 24px;max-width:400px;width:100%}
h1{font-size:22px;text-align:center;color:#ff6b35;margin-bottom:8px}
.sub{text-align:center;font-size:12px;color:#666;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field input{width:100%;background:#222;border:1px solid #444;border-radius:10px;padding:12px;color:#ddd;font-size:14px;outline:none;font-family:inherit}
.field input:focus{border-color:#ff6b35}
.field .hint{font-size:10px;color:#555;margin-top:4px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;color:#fff;background:linear-gradient(135deg,#ff6b35,#f7931e);margin-top:8px;touch-action:manipulation}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.result{background:#1a2a1a;border:1px solid #2d5a2d;border-radius:10px;padding:20px;margin-top:16px;text-align:center;display:none}
.result .ok{font-size:30px;margin-bottom:8px}
.result .msg{font-size:14px;color:#22c55e;margin-bottom:12px}
.result .id-box{background:#111;border:1px solid #333;border-radius:8px;padding:14px;font-size:18px;font-family:monospace;color:#ff6b35;word-break:break-all;margin-bottom:12px}
.result .btns{display:flex;gap:8px}
.result .btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit}
.result .copy-btn{background:#ff6b35;color:#fff}
.result .login-btn{background:#333;color:#ccc}
.error{background:#2a1a1a;border:1px solid #5a2d2d;border-radius:10px;padding:14px;margin-top:12px;font-size:13px;color:#ef4444;text-align:center;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>注册账号</h1>
  <div class="sub">注册后可登录天笑の窝</div>

  <div class="field">
    <label>用户名</label>
    <input type="text" id="username" placeholder="1-8位中英文数字下划线" maxlength="8" autocomplete="off">
  </div>
  <div class="field">
    <label>密码</label>
    <input type="password" id="password" placeholder="至少8位，含字母" autocomplete="off">
  </div>
  <div class="field">
    <label>确认密码</label>
    <input type="password" id="password2" placeholder="再次输入密码" autocomplete="off">
  </div>
  <div class="field">
    <label>邀请码</label>
    <input type="text" id="inviteCode" placeholder="请输入邀请码" autocomplete="off">
  </div>
  <div class="field">
    <label>验证问题：最帅的群主是谁？</label>
    <input type="text" id="answer" placeholder="请输入答案" autocomplete="off">
  </div>

  <button class="btn" id="btnSubmit" onclick="doRegister()">注册</button>

  <div class="error" id="errorBox"></div>
  <div class="result" id="resultBox">
    <div class="ok">🎉</div>
    <div class="msg">注册成功！请保管好你的账号ID</div>
    <div class="id-box" id="idDisplay"></div>
    <div class="btns">
      <button class="copy-btn" onclick="copyId()">📋 复制ID</button>
      <button class="login-btn" onclick="copyId()">已复制，关闭</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.tianxiao.us.kg';

async function doRegister(){
  var btn=document.getElementById('btnSubmit'),err=document.getElementById('errorBox'),res=document.getElementById('resultBox');
  err.style.display='none';res.style.display='none';

  var u=document.getElementById('username').value.trim(),p=document.getElementById('password').value.trim(),
      p2=document.getElementById('password2').value.trim(),inv=document.getElementById('inviteCode').value.trim(),
      ans=document.getElementById('answer').value.trim();

  if(!u||!p||!p2||!inv||!ans){showErr('所有字段都必须填写');return;}
  if(u.length<1||u.length>8){showErr('用户名1-8字符');return;}
  if(!/^[a-zA-Z0-9_一-龥]+$/.test(u)){showErr('用户名只能中英文数字下划线');return;}
  if(p.length<8){showErr('密码至少8位');return;}
  if(!/[a-zA-Z]/.test(p)){showErr('密码必须包含至少一个字母');return;}
  if(p!==p2){showErr('两次密码不一致');return;}

  btn.disabled=true;btn.textContent='注册中...';

  try{
    var r=await fetch(API+'/api/user/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p,password2:p2,inviteCode:inv,answer:ans,fingerprint:u+Date.now()})});
    var d=await r.json();
    if(d.success){
      document.getElementById('idDisplay').textContent=d.userId;
      res.style.display='block';
      btn.style.display='none';
    }else{showErr(d.error||'注册失败');btn.disabled=false;btn.textContent='注册';}
  }catch(e){showErr('网络错误，请重试');btn.disabled=false;btn.textContent='注册';}
}

function showErr(msg){var e=document.getElementById('errorBox');e.textContent=msg;e.style.display='block';}

function copyId(){
  var id=document.getElementById('idDisplay').textContent;
  navigator.clipboard.writeText(id).then(function(){alert('已复制: '+id);}).catch(function(){
    var ta=document.createElement('textarea');ta.value=id;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    alert('已复制: '+id);
  });
}
</script>
</body>
</html>
